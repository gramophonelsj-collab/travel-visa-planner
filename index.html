<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出境签证材料查询 — Travel Planner</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--card2:#f8f9fa;--text:#1f2937;--text2:#6b7280;--border:#e0e0e0;--primary:#2563eb;--plight:#dbeafe;--green:#16a34a;--greenbg:#dcfce7;--amber:#d97706;--amberbg:#fef3c7;--red:#dc2626;--redbg:#fee2e2}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--card:#1e293b;--card2:#1a2332;--text:#e2e8f0;--text2:#94a3b8;--border:#334155;--primary:#3b82f6;--plight:#1e3a5f;--greenbg:#052e16;--amberbg:#422006;--redbg:#450a0a}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr .logo{font-size:17px;font-weight:700}.hdr .logo i{color:var(--primary);font-style:normal}
.hdr .sub{font-size:11px;color:var(--text2)}
.tabs{display:flex;gap:0;background:var(--card);border-bottom:2px solid var(--border);padding:0 20px;overflow-x:auto}
.tabs button{padding:11px 16px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap;font-family:inherit}
.tabs button:hover{color:var(--text)}.tabs button.on{color:var(--primary);border-bottom-color:var(--primary)}
.main{max-width:1000px;margin:0 auto;padding:20px 16px 40px}
.panel{display:none}.panel.on{display:block}
.search-wrap{max-width:500px;margin-bottom:16px}
.search-wrap input{width:100%;padding:10px 14px;font-size:15px;font-family:inherit;border:2px solid var(--border);border-radius:8px;background:var(--card);color:var(--text)}
.search-wrap input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--plight)}
.search-wrap .hint{font-size:12px;color:var(--text2);margin-top:4px;padding-left:4px}
.grid{display:grid;grid-template-columns:240px 1fr;gap:16px;min-height:400px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
.sidebar{background:var(--card);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;max-height:70vh;overflow-y:auto}
.sidebar .reg{font-size:10px;font-weight:700;color:var(--text2);padding:8px 14px 2px;text-transform:uppercase;letter-spacing:1px}
.sidebar .item{padding:8px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;border-left:3px solid transparent;transition:.1s}
.sidebar .item:hover{background:var(--card2)}.sidebar .item.sel{background:var(--plight);border-left-color:var(--primary);font-weight:600;color:var(--primary)}
.sidebar .item .f{font-size:16px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.dot.free{background:var(--green)}.dot.evisa{background:var(--amber)}.dot.sticker{background:var(--red)}.dot.voa{background:var(--primary)}
.detail{background:var(--card);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:22px}
.detail .empty{text-align:center;padding:50px 20px;color:var(--text2)}.detail .empty .ic{font-size:48px;margin-bottom:8px}
.dhead{margin-bottom:16px}.dhead .bigf{font-size:44px}
.dhead h2{font-size:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:4px}
.badge{display:inline-block;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:600}
.badge.free{background:var(--greenbg);color:var(--green)}.badge.evisa{background:var(--amberbg);color:var(--amber)}.badge.sticker{background:var(--redbg);color:var(--red)}.badge.voa{background:var(--plight);color:var(--primary)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.cards .c{background:var(--card2);border-radius:6px;padding:10px 12px;border:1px solid var(--border)}.cards .c .lbl{font-size:10px;color:var(--text2);text-transform:uppercase}.cards .c .val{font-size:14px;font-weight:700;margin-top:2px}
.note{background:var(--card2);border-left:3px solid var(--primary);padding:10px 14px;border-radius:0 6px 6px 0;margin-bottom:14px;font-size:12.5px;line-height:1.8}
.sec{margin-top:16px}.sec h3{font-size:14px;margin-bottom:8px}
.doc-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:5px;margin-bottom:3px;cursor:pointer;border:1px solid transparent}
.doc-item:hover{border-color:var(--border);background:var(--card2)}
.doc-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--primary);flex-shrink:0}
.doc-item .txt{flex:1;font-size:13px}.doc-item .tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;white-space:nowrap}
.tag.must{background:var(--redbg);color:var(--red)}.tag.tip{background:var(--card2);color:var(--text2)}
.doc-item.done .txt{text-decoration:line-through;color:var(--text2)}
.step{display:flex;gap:10px;margin-bottom:8px}.step .n{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}.step .b{font-size:13px;padding-top:2px}
.btns{margin-top:16px;display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:.15s;white-space:nowrap;font-family:inherit;text-decoration:none}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{opacity:.88}
.btn-o{background:var(--card);color:var(--text);border-color:var(--border)}.btn-o:hover{background:var(--card2)}.btn-s{padding:4px 10px;font-size:11px}
.trip-card{background:var(--card);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.tc-f{font-size:32px}.tc-i{flex:1;min-width:160px}.tc-i h4{font-size:14px}.tc-i .m{font-size:11px;color:var(--text2)}
.pbar{width:100%;height:5px;background:var(--border);border-radius:99px;margin-top:5px;overflow:hidden}.pbar .f{height:100%;border-radius:99px;transition:.3s;background:var(--primary)}
.tc-pct{font-size:22px;font-weight:700;color:var(--primary);text-align:center}.tc-pct .lbl{font-size:10px;color:var(--text2)}
.tbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px;justify-content:space-between}.tbar .L,.tbar .R{display:flex;gap:6px;flex-wrap:wrap}
.twrap{overflow-x:auto;background:var(--card);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:550px}
th{background:var(--card2);padding:8px 10px;text-align:left;font-weight:600;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid var(--border)}tr:hover td{background:var(--card2)}
.st{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}.st.done{background:var(--greenbg);color:var(--green)}.st.prog{background:var(--amberbg);color:var(--amber)}.st.todo{background:var(--card2);color:var(--text2)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;justify-content:center;align-items:flex-start;padding:30px 16px;overflow-y:auto}.ov.on{display:flex}
.md{background:var(--card);border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,.12);width:100%;max-width:520px;padding:20px}.md h3{font-size:15px;margin-bottom:12px}
.md .fg{margin-bottom:10px}.md .fg label{display:block;font-size:12px;font-weight:600;margin-bottom:2px}
.md .fg input,.md .fg select,.md .fg textarea{width:100%;padding:6px 9px;font-size:12px;font-family:inherit;border:1px solid var(--border);border-radius:5px;background:var(--card);color:var(--text)}
.md .fg input:focus,.md .fg select:focus,.md .fg textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--plight)}
.md .fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}.md .fa{display:flex;gap:6px;justify-content:flex-end;margin-top:14px}
.md textarea{resize:vertical;min-height:50px}
.sel-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;padding:8px 12px;background:var(--card2);border-radius:8px;align-items:center}
.sel-bar .sel-label{font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap}
.sel-bar .sel-divider{width:1px;height:18px;background:var(--border);margin:0 6px}
.sel-pill{padding:4px 12px;border-radius:99px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:.15s;white-space:nowrap;font-family:inherit}
.sel-pill:hover{border-color:var(--primary)}
.sel-pill.sel{background:var(--primary);color:#fff;border-color:var(--primary)}
.occ-note{font-size:11px;color:var(--amber);margin-top:8px;padding:6px 10px;background:var(--amberbg);border-radius:5px;display:none}
.tl{position:relative;padding-left:18px}.tl::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--border)}
.tli{position:relative;margin-bottom:14px;padding-left:18px}.tli::before{content:'';position:absolute;left:-16px;top:5px;width:10px;height:10px;border-radius:50%;border:2px solid var(--card)}
.tli.v::before{background:#8b5cf6;box-shadow:0 0 0 2px #8b5cf6}.tli.f::before{background:#3b82f6;box-shadow:0 0 0 2px #3b82f6}.tli.h::before{background:#f59e0b;box-shadow:0 0 0 2px #f59e0b}
.tld{font-size:10px;color:var(--text2);font-weight:600}.tlc{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:8px 11px;margin-top:2px}
.tlc .t{font-weight:600;font-size:12px}.tlc .d{font-size:10px;color:var(--text2)}
.flx{display:flex;align-items:center;gap:6px;flex-wrap:wrap}.emp{text-align:center;padding:36px 16px;color:var(--text2)}.emp .ic{font-size:36px;margin-bottom:6px}
@media(max-width:700px){.md .fr{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}}
@media print{body{background:#fff}.hdr,.tabs,.tbar,.btn,.ov,.btns,button{display:none!important}.panel{display:block!important;margin-bottom:18px}.main{padding:0;max-width:100%}.panel::before{content:attr(data-title);display:block;font-size:16px;font-weight:700;margin-bottom:8px;border-bottom:2px solid #000;padding-bottom:4px}.search-wrap,.sidebar{display:none}.grid{grid-template-columns:1fr}.twrap{box-shadow:none}@page{margin:10mm}}
/* v2.1 occ-all-34 */</style>
</head>
<body>
<header class="hdr"><div class="logo">🌍 <i>出境签证</i> 材料查询</div><div class="flx"><span class="sub" id="userDisp" style="cursor:pointer;font-weight:600;color:var(--primary)" onclick="showUserMenu()">👤 点击登录</span><span class="sub" style="margin-left:6px">🇨🇳 中国护照</span></div></header>
<nav class="tabs" id="tabs">
    <button class="on" data-p="visa">🌍 签证查询</button><button data-p="trips">📋 我的行程</button><button data-p="flights">🛫 机票比选</button><button data-p="hotels">🏨 酒店比选</button><button data-p="timeline">📅 行程总览</button>
</nav>
<main class="main">

<section class="panel on" id="p-visa" data-title="签证查询">
    <div class="search-wrap"><input type="text" id="sIn" placeholder="输入目的地，如：日本、美国、申根…" oninput="doSearch()" onkeydown="if(event.key==='Enter')searchEnter()" autocomplete="off"><div class="hint" id="sHint"></div></div>
    <div class="grid">
        <div class="sidebar" id="sBar"></div>
        <div class="detail" id="detail"><div class="empty"><div class="ic">🌍</div><p style="font-size:15px;font-weight:600;margin-bottom:4px">选择或搜索目的地</p><p style="font-size:13px">左侧选择国家，或在上方搜索框输入</p></div></div>
    </div>
</section>

<section class="panel" id="p-trips" data-title="我的行程">
    <div class="tbar"><div class="L"><button class="btn btn-o btn-s" onclick="exp()">📥 导出备份</button><button class="btn btn-o btn-s" onclick="document.getElementById('imp').click()">📤 导入恢复</button><input type="file" id="imp" accept=".json" style="display:none" onchange="imp(event)"></div></div>
    <div id="tWrap"></div>
</section>

<section class="panel" id="p-flights" data-title="机票比选">
    <div class="tbar"><div class="L"><button class="btn btn-p btn-s" onclick="openF()">＋ 添加航班</button></div></div>
    <div class="twrap"><table><thead><tr><th>航司</th><th>航班号</th><th>出发</th><th>到达</th><th>出发</th><th>到达</th><th>中转</th><th>价格</th><th>行李</th><th>状态</th><th>操作</th></tr></thead><tbody id="ftb"></tbody></table></div>
</section>

<section class="panel" id="p-hotels" data-title="酒店比选">
    <div class="tbar"><div class="L"><button class="btn btn-p btn-s" onclick="openH()">＋ 添加酒店</button></div></div>
    <div class="twrap"><table><thead><tr><th>酒店</th><th>城市</th><th>入住</th><th>退房</th><th>价格/晚</th><th>评分</th><th>取消</th><th>状态</th><th>备注</th><th>操作</th></tr></thead><tbody id="htb"></tbody></table></div>
</section>

<section class="panel" id="p-timeline" data-title="行程总览">
    <div class="tbar"><button class="btn btn-o btn-s" onclick="rTl()">🔄 刷新</button></div><div id="tlW"></div>
</section>

</main>
<div class="ov" id="ov" onclick="if(event.target===this)closeM()"><div class="md" id="md"></div></div>

<script>
// ===================== VISA DATABASE (34 countries) =====================
